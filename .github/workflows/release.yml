name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o dist/firmdiff-linux-amd64   ./cmd/firmdiff
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -o dist/firmdiff-linux-arm64   ./cmd/firmdiff
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o dist/firmdiff-darwin-arm64  ./cmd/firmdiff
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o dist/firmdiff-darwin-amd64  ./cmd/firmdiff
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/firmdiff-windows-amd64.exe ./cmd/firmdiff

      - name: Checksums
        run: |
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*